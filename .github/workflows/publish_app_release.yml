name: app-build-action-manual

# 1. 移除了繁琐的 Tag 触发，改用手动一键触发，且支持推送到 master 分支时自动编译
on:
  workflow_dispatch: # 开启网页手动触发按钮
  push:
    branches:
      - master # 提交到 master 分支时自动编译

jobs:
  build-mac-ios-android:
    runs-on: macos-latest
    steps:
      # 1. 签出代码
      - uses: actions/checkout@v4
        with:
          ref: master

      # 2. 设置 JAVA 环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 3. 设置 Flutter 
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 4. 开启 MacOS 桌面支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 5. 更新依赖
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 6. 打包 Android (不使用签名，直接编 release 或是 debug 包)
      # 这里使用 --no-shrink 避开混淆报错，无需任何 Secrets 即可编译
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --no-shrink

      # 7. 上传 APK 
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk

      # 8. 打包 iOS (免证书)
      - name: Build IPA
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      # 9. 创建未签名 ipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload

      # 10. 上传未签名 IPA
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 11. 安装打包工具并打包 macOS 应用
      - name: Install appdmg
        run: npm install -g appdmg

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build MacOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # 12. 上传 macOS 应用
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
